<div class="page">

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="form-card">

    <div class="header-section">
      <div class="icon-box">✈</div>

      <div>
        <h1>Flight Registration</h1>
        <p class="subtitle">
          Configure routes, fare details and seat allocations
        </p>
      </div>
    </div>

    <div class="success" *ngIf="successMessage">
      {{successMessage}}
    </div>

    <form #flightForm="ngForm" (ngSubmit)="addFlight(flightForm)">

      <div class="section-title">Flight Information</div>

      <select [(ngModel)]="flight.carrierName" name="carrierName" required>
        <option value="">Select Carrier</option>
        <option *ngFor="let carrier of carriers" [value]="carrier.carrierName">
          {{carrier.carrierName}}
        </option>
      </select>

      <div class="route-grid">

        <input
          type="text"
          placeholder="Origin Airport"
          [(ngModel)]="flight.origin"
          name="origin"
          required
          minlength="3"
        >

        <input
          type="text"
          placeholder="Destination Airport"
          [(ngModel)]="flight.destination"
          name="destination"
          required
          minlength="3"
        >

      </div>

      <div class="date-field">
        <input
          type="date"
          [(ngModel)]="flight.departureDate"
          name="departureDate"
          required
          [attr.min]="today"
        />
      </div>

      <div class="section-title">Fare Configuration</div>

<div class="section-title">
  Fare Configuration
</div>

<div class="fare-grid">

  <div class="fare-card">

    <span class="fare-icon">🧳</span>

    <label>Economy Fare</label>

    <input
      type="number"
      placeholder="Economy Fare (₹)"
      [(ngModel)]="flight.economyFare"
      name="economyFare"
      required
      min="100"
      (input)="calculatePricing()">

  </div>

  <div class="fare-card">

    <span class="fare-icon">💼</span>

    <label>Business Fare</label>

    <input
      type="number"
      placeholder="Business Fare (₹)"
      [(ngModel)]="flight.businessFare"
      name="businessFare"
      readonly>

  </div>

  <div class="fare-card">

    <span class="fare-icon">👑</span>

    <label>Executive Fare</label>

    <input
      type="number"
      placeholder="Executive Fare (₹)"
      [(ngModel)]="flight.executiveFare"
      name="executiveFare"
      readonly>

  </div>

</div>

      <div class="section-title">Seat Allocation</div>

      <div class="seat-grid">

        <div class="seat-card">
          <span>💼</span>
          <input
            type="number"
            placeholder="Business"
            [(ngModel)]="flight.seatCapacityBusiness"
            name="seatCapacityBusiness"
            required
            min="1"
            max="300"
          >
        </div>

        <div class="seat-card">
          <span>🧳</span>
          <input
            type="number"
            placeholder="Economy"
            [(ngModel)]="flight.seatCapacityEconomy"
            name="seatCapacityEconomy"
            required
            min="1"
            max="300"
          >
        </div>

        <div class="seat-card">
          <span>👑</span>
          <input
            type="number"
            placeholder="Executive"
            [(ngModel)]="flight.seatCapacityExecutive"
            name="seatCapacityExecutive"
            required
            min="1"
            max="300"
          >
        </div>

      </div>

      <button type="submit" [disabled]="flightForm.invalid">
        ✈ Register Flight
      </button>

    </form>

  </div>

</div>
