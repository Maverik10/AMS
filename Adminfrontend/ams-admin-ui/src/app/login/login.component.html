<div class="login-page">

  <div class="login-card">

    <h1>✈ Airline Management System</h1>

    <p>
      CloudScanner Admin Login
    </p>

    <div
      class="error"
      *ngIf="errorMessage">

      {{errorMessage}}

    </div>

    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username">

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button
      (click)="login()">

      Login

    </button>

  </div>

</div>
